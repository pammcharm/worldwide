{% extends "layouts/base.html" %}
{% block title %}Complete Payment - WorldWide{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="font-display text-3xl font-bold mb-2">Complete Payment</h1>
    <p class="text-gray-500 mb-8">Order #{{ order.order_number }} - ${{ order.total }}</p>
    
    <div class="bg-white rounded-2xl border border-gray-100 p-6">
        <form id="payment-form">
            <div id="payment-element" class="mb-6"></div>
            <button id="submit" class="w-full py-4 btn-primary text-white font-semibold rounded-xl flex items-center justify-center gap-2">
                <i data-lucide="lock" class="w-5 h-5"></i>
                Pay ${{ order.total }}
            </button>
            <div id="error-message" class="text-red-500 text-sm mt-3 hidden"></div>
        </form>
    </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
const stripe = Stripe("{{ stripe_key }}");
const clientSecret = "{{ client_secret }}";

const appearance = { theme: "stripe" };
const elements = stripe.elements({ appearance, clientSecret });
const paymentElement = elements.create("payment");
paymentElement.mount("#payment-element");

document.getElementById("payment-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const { error } = await stripe.confirmPayment({
        elements,
        confirmParams: { return_url: window.location.origin + "/orders/" + "{{ order.order_number }}/" },
    });
    if (error) {
        document.getElementById("error-message").textContent = error.message;
        document.getElementById("error-message").classList.remove("hidden");
    }
});
</script>
{% endblock %}
