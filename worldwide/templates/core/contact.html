{% extends "layouts/base.html" %}
{% block title %}Contact Us - WorldWide{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="text-center mb-12">
        <h1 class="font-display text-4xl font-bold mb-4">Get in Touch</h1>
        <p class="text-gray-500">We would love to hear from you. Send us a message!</p>
    </div>
    
    <div class="grid md:grid-cols-2 gap-8">
        <div class="bg-white rounded-2xl border border-gray-100 p-8">
            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Name</label>
                    <input type="text" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand-300 focus:ring-2 focus:ring-brand-100 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                    <input type="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand-300 focus:ring-2 focus:ring-brand-100 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Message</label>
                    <textarea rows="5" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand-300 focus:ring-2 focus:ring-brand-100 outline-none"></textarea>
                </div>
                <button type="submit" class="w-full py-3.5 btn-primary text-white font-semibold rounded-xl">Send Message</button>
            </form>
        </div>
        
        <div class="space-y-6">
            <div class="bg-white rounded-2xl border border-gray-100 p-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-brand-100 flex items-center justify-center">
                        <i data-lucide="mail" class="w-5 h-5 text-brand-600"></i>
                    </div>
                    <div>
                        <p class="font-medium text-sm">Email</p>
                        <p class="text-sm text-gray-500">hello@worldwide.com</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 p-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-green-100 flex items-center justify-center">
                        <i data-lucide="phone" class="w-5 h-5 text-green-600"></i>
                    </div>
                    <div>
                        <p class="font-medium text-sm">Phone</p>
                        <p class="text-sm text-gray-500">+250 788 000 000</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 p-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-pink-100 flex items-center justify-center">
                        <i data-lucide="map-pin" class="w-5 h-5 text-pink-600"></i>
                    </div>
                    <div>
                        <p class="font-medium text-sm">Address</p>
                        <p class="text-sm text-gray-500">Kigali, Rwanda</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
