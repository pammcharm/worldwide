{% if supabase_auth_enabled %}
<div class="space-y-3">
    <button type="button" data-supabase-provider="google" class="w-full flex items-center justify-center gap-3 py-3 rounded-xl border border-gray-200 bg-white text-gray-800 font-semibold hover:bg-gray-50 transition-colors disabled:opacity-60 disabled:cursor-wait">
        <svg class="w-5 h-5" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M21.6 12.23c0-.78-.07-1.53-.2-2.23H12v4.22h5.37a4.59 4.59 0 0 1-1.99 3.01v2.5h3.22c1.88-1.73 3-4.28 3-7.5z"/>
            <path fill="#34A853" d="M12 22c2.7 0 4.96-.9 6.61-2.42l-3.22-2.5c-.89.6-2.03.96-3.39.96-2.6 0-4.8-1.76-5.59-4.12H3.08v2.58A10 10 0 0 0 12 22z"/>
            <path fill="#FBBC05" d="M6.41 13.92A6 6 0 0 1 6.1 12c0-.67.11-1.32.31-1.92V7.5H3.08A10 10 0 0 0 2 12c0 1.61.39 3.14 1.08 4.5l3.33-2.58z"/>
            <path fill="#EA4335" d="M12 5.96c1.47 0 2.79.51 3.83 1.5l2.86-2.86C16.95 2.98 14.69 2 12 2a10 10 0 0 0-8.92 5.5l3.33 2.58C7.2 7.72 9.4 5.96 12 5.96z"/>
        </svg>
        Continue with Google
    </button>
    <button type="button" data-supabase-provider="github" class="w-full flex items-center justify-center gap-3 py-3 rounded-xl border border-gray-900 bg-gray-900 text-white font-semibold hover:bg-black transition-colors disabled:opacity-60 disabled:cursor-wait">
        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.04c-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.08 1.83 2.82 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.66-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 12 .5z"/>
        </svg>
        Continue with GitHub
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(() => {
    const supabaseUrl = "{{ supabase_url|escapejs }}";
    const supabaseAnonKey = "{{ supabase_anon_key|escapejs }}";
    const callbackUrl = "{{ request.scheme }}://{{ request.get_host }}{% url 'accounts:supabase_callback' %}";
    const client = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

    document.querySelectorAll("[data-supabase-provider]").forEach(button => {
        button.addEventListener("click", async () => {
            const provider = button.dataset.supabaseProvider;
            button.disabled = true;
            const originalText = button.innerHTML;
            button.innerHTML = "Redirecting in this tab...";
            const { error } = await client.auth.signInWithOAuth({
                provider,
                options: { redirectTo: callbackUrl }
            });
            if (error) {
                button.disabled = false;
                button.innerHTML = originalText;
                alert(error.message);
            }
        });
    });
})();
</script>
{% endif %}
