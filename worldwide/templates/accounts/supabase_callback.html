{% extends "layouts/base.html" %}
{% block title %}Signing In - WorldWide{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-16">
    <div class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm text-center max-w-md w-full">
        <div class="w-12 h-12 rounded-xl bg-brand-100 text-brand-600 flex items-center justify-center mx-auto mb-4">
            <i data-lucide="loader" class="w-6 h-6 animate-spin"></i>
        </div>
        <h1 class="font-display text-xl font-bold">Signing you in</h1>
        <p class="text-gray-500 mt-2" id="supabase-status">Checking your Supabase session...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async () => {
    const status = document.getElementById("supabase-status");
    const client = window.supabase.createClient("{{ supabase_url|escapejs }}", "{{ supabase_anon_key|escapejs }}");
    const { data, error } = await client.auth.getSession();

    if (error || !data.session) {
        status.textContent = "Could not read your Supabase session. Please try again.";
        setTimeout(() => window.location.href = "{% url 'accounts:login' %}", 1800);
        return;
    }

    const response = await fetch("{% url 'accounts:supabase_token_login' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({ access_token: data.session.access_token })
    });
    const result = await response.json();
    if (result.success) {
        window.location.href = result.redirect_url || "{% url 'core:home' %}";
    } else {
        status.textContent = result.error || "Supabase login failed.";
        setTimeout(() => window.location.href = "{% url 'accounts:login' %}", 2200);
    }
})();
</script>
{% endblock %}
