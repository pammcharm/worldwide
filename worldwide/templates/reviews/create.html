{% extends "layouts/base.html" %}
{% block title %}Write a Review - WorldWide{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="font-display text-3xl font-bold mb-2">Write a Review</h1>
    <p class="text-gray-500 mb-8">for {{ product.name }}</p>
    
    <div class="bg-white rounded-2xl border border-gray-100 p-6">
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Rating</label>
                <div class="flex gap-2" x-data="{ rating: 5 }">
                    {% for i in "12345" %}
                    <label class="cursor-pointer">
                        <input type="radio" name="rating" value="{{ forloop.counter }}" class="hidden" {% if forloop.last %}checked{% endif %}>
                        <i data-lucide="star" class="w-8 h-8 text-yellow-400 hover:fill-yellow-400 transition-colors"></i>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Review Title</label>
                <input type="text" name="title" placeholder="Summarize your experience" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand-300 focus:ring-2 focus:ring-brand-100 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Your Review</label>
                <textarea name="body" rows="5" required placeholder="Tell others about your experience with this product..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-brand-300 focus:ring-2 focus:ring-brand-100 outline-none"></textarea>
            </div>
            <button type="submit" class="px-8 py-3 btn-primary text-white font-semibold rounded-xl">Submit Review</button>
        </form>
    </div>
</div>
{% endblock %}
