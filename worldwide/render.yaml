services:
  - type: web
    name: worldwide
    env: python
    pythonVersion: 3.12
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn worldwide.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --threads 2 --worker-class gthread
    healthCheckPath: /
    memoryMB: 512
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: CSRF_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SECURE_BROWSER_XSS_FILTER
        value: "true"
      - key: SECURE_CONTENT_TYPE_NOSNIFF
        value: "true"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "true"
      - key: SECURE_HSTS_PRELOAD
        value: "true"
      - fromGroup: database
      - fromGroup: secrets

databases:
  - name: postgresql
    databaseName: worldwide
    user: postgres
    region: oregon

envVarGroups:
  - name: database
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgresql
          property: connectionString
  - name: secrets
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYPACK_CLIENT_ID
        sync: false
      - key: PAYPACK_CLIENT_SECRET
        sync: false
      - key: PAYPACK_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
